<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
</head>
<body>
    <div class="col-md-6 mx-auto bg-secondary mt-5">
        <ul class="breadcrumb">
            <li class="breadcrumb-item">Home</li>
            <li class="breadcrumb-item"><a href="#">Courses</a></li>
            <li class="breadcrumb-item"><a href="#">Web Development</a></li>
        </ul>

<h2 class="text-white">Web Development Course <span class="badge badge-danger badge-pill">New</span></h2>

        <div class="progress mt-5">
            <div class="progress-bar progress-bar-striped bg-success" style="width: 100%;">HTML-100%</div>
        </div>

        <div class="progress mt-5">
            <div class="progress-bar progress-bar-striped progress-bar-animated bg-primary" style="width: 75%;">CSS-75%</div>
        </div>

         <div class="progress mt-5">
            <div class="progress-bar" style="width: 50%; background-color: orange;">JAVASCRIPT-50%</div>
        </div>

         <div class="progress mt-5">
            <div class="progress-bar bg-danger" style="width: 25%;">BOOTSTRAP-25%</div>
        </div>

        <div class="btn-group mt-5">
        <button type="button"class="btn btn-success">Start</button>
        <button type="button"class="btn btn-warning">Pause</button>
        <button type="button"class="btn btn-light    ">Reset</button> 
        </div>

         <ul class="pagination justify-content-end  mt-5 p-3">
        <li class="page-item active"><a class="page-link" href="#">1</a></li>
        <li class="page-item"><a class="page-link" href="#">2</a></li>
        <li class="page-item disabled"><a class="page-link" href="#">3</a></li>
    </ul>
    </div>
</body>
</html>
