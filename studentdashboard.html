<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Student Dashboard</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
</head>
<body>
    <div class="col-md-8 mx-auto mt-5 p-4" style="background-color: rgb(235, 235, 235);">
    <ul class="breadcrumb">
        <li class="breadcrumb-item">Home</li>
        <li class="breadcrumb-item"><a href="#">Dashboard</a></li>
        <li class="breadcrumb-item"><a href="#">My Coursess</a></li>
    </ul>                                                                                                                                                                                                     
    <button type="button"
        class="btn btn-outline-primary mt-3">Start New Course
    </button>

    <h3>My Progress <span class="badge badge-info mt-5">3 Courses</span></h3>

    <div class="progress mt-5">
        <div class="progress-bar progress-bar-striped progress-bar-animated bg-success" style="width:70%;">70%</div> 
    </div>

    <ul class="pagination justify-content-end  mt-5">
        <li class="page-item "><a class="page-link" href="#">Previous</a></li>
        <li class="page-item "><a class="page-link" href="#">1</a></li>
        <li class="page-item active"><a class="page-link" href="#">2</a></li>
        <li class="page-item"><a class="page-link" href="#">3</a></li>
        <li class="page-item"><a class="page-link" href="#">Next</a></li>
    </ul>
    </div>
</body>
</html>
