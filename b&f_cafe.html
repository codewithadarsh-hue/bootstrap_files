<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweetsmith Creamery</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-4">
    <div class="card">
        <div class="card-body">
            <h3 class="card-title text-center mb-4">
                Feedback Form | Sweetsmith Creamery
            </h3>

            <form>

                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" class="form-control" id="name" placeholder="Enter your name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="feedback">Feedback:</label>
                    <textarea class="form-control" id="feedback" rows="4" placeholder="Enter your feedback" required></textarea>
                </div>

                <div class="form-group">
                    <label>Preferred Contact Method:</label><br>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" id="contactEmail" name="contactMethod" value="Email">
                        <label class="form-check-label" for="contactEmail">Email</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" id="contactPhone" name="contactMethod" value="Phone">
                        <label class="form-check-label" for="contactPhone">Phone</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="orderType">Type of Order:</label>
                    <select class="form-control" id="orderType" required>
                        <option value="" selected disabled>Select an order type</option>
                        <option>Cake</option>
                        <option>Cookies</option>
                        <option>Pastries</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="satisfaction">Satisfaction Level (1 to 10):</label>
                    <input type="range" class="form-control-range" id="satisfaction" min="1" max="10">
                </div>

                <button type="submit" class="btn btn-primary d-block mx-auto mt-4">
                    Submit
                </button>

            </form>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>

</body> 
</html>
